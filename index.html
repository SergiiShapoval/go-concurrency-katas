<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>go-concurrency-katas Benchmarks</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f3ee;
      --panel: #fffdf8;
      --text: #1f1b16;
      --muted: #6f6458;
      --link: #0f5f4b;
      --border: #ded6c9;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at top left, #efe8da 0, transparent 35%),
        linear-gradient(180deg, #f8f5ef 0%, var(--bg) 100%);
      color: var(--text);
    }

    main {
      max-width: 760px;
      margin: 12vh auto;
      padding: 32px 24px;
    }

    .panel {
      padding: 32px;
      background: color-mix(in srgb, var(--panel) 92%, white);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: 0 18px 60px rgba(30, 24, 17, 0.08);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 5vw, 3.25rem);
      line-height: 1.05;
    }

    p {
      margin: 0 0 16px;
      font-size: 1.05rem;
      line-height: 1.65;
      color: var(--muted);
    }

    a {
      color: var(--link);
    }

    .button {
      display: inline-block;
      margin-top: 8px;
      padding: 12px 18px;
      border-radius: 999px;
      text-decoration: none;
      background: var(--link);
      color: #fffdf8;
    }

    code {
      font-family: "SFMono-Regular", Menlo, Monaco, monospace;
      font-size: 0.95em;
    }
  </style>
</head>
<body>
  <main>
    <section class="panel">
      <h1>Go Concurrency Katas Benchmarks</h1>
      <p>
        Benchmark history for <code>go-concurrency-katas</code> is published under
        <code>/dev/bench</code>.
      </p>
      <p>
        Once the benchmark workflow pushes its first snapshot, the dashboard will appear there.
      </p>
      <a class="button" href="./dev/bench/">Open Benchmark Dashboard</a>
    </section>
  </main>
</body>
</html>
